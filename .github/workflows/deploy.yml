name: CICD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install lftp and sshpass
        run: sudo apt-get install -y lftp sshpass

      - name: Backup and deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.sftp_host }}
          SFTP_USER: ${{ secrets.sftp_user }}
          SSHPASS: ${{ secrets.sftp_pwd }}
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          ARCHIVE_NAME="backup_${TIMESTAMP}.tar.gz"
          REPO_DIR="${GITHUB_WORKSPACE}"
          LFTP_OPTS="set sftp:connect-program 'sshpass -e ssh -a -x -o StrictHostKeyChecking=no'"

          # --- Step 1: Download existing files for backup ---
          lftp -c "$LFTP_OPTS; open -u $SFTP_USER, sftp://$SFTP_HOST; \
            set cmd:fail-exit false; \
            mkdir -p archive; \
            get index.php -o /tmp/backup_index.php; \
            mirror src /tmp/backup_src; \
            bye" || { echo "Backup step failed"; exit 1; }

          # Build archive from whatever was downloaded (handles first deploy)
          ARCHIVE_CONTENTS=""
          [ -f /tmp/backup_index.php ] && ARCHIVE_CONTENTS="$ARCHIVE_CONTENTS backup_index.php"
          [ -d /tmp/backup_src ] && ARCHIVE_CONTENTS="$ARCHIVE_CONTENTS backup_src"

          if [ -n "$ARCHIVE_CONTENTS" ]; then
            tar -czf /tmp/${ARCHIVE_NAME} -C /tmp $ARCHIVE_CONTENTS
          else
            echo "No existing files found — skipping backup archive creation (first deploy)"
          fi

          # --- Step 2: Upload archive and deploy new files ---
          UPLOAD_ARCHIVE=""
          [ -f /tmp/${ARCHIVE_NAME} ] && UPLOAD_ARCHIVE="put /tmp/${ARCHIVE_NAME} -o archive/${ARCHIVE_NAME};"

          lftp -c "$LFTP_OPTS; open -u $SFTP_USER, sftp://$SFTP_HOST; \
            set xfer:log true; \
            $UPLOAD_ARCHIVE \
            set cmd:fail-exit false; \
            rm index.php; \
            rm -rf src; \
            set cmd:fail-exit true; \
            lcd $REPO_DIR; \
            put index.php; \
            mirror -R src src; \
            bye" || { echo "Deploy step failed"; exit 1; }
