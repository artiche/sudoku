name: CICD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: lftp
          version: 1.0

      - name: Backup and deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.sftp_host }}
          SFTP_USER: ${{ secrets.sftp_user }}
          SFTP_PWD: ${{ secrets.sftp_pwd }}
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          ARCHIVE_NAME="backup_${TIMESTAMP}.tar.gz"
          REPO_DIR="${GITHUB_WORKSPACE}"

          # Store credentials in ~/.netrc — cleaned up via trap even on failure
          printf 'machine %s login %s password %s\n' \
            "${SFTP_HOST}" "${SFTP_USER}" "${SFTP_PWD}" > ~/.netrc
          chmod 600 ~/.netrc
          trap 'rm -f ~/.netrc /tmp/lftp_backup.sh /tmp/lftp_deploy.sh' EXIT

          # --- Step 1: Download existing files for backup ---
          cat > /tmp/lftp_backup.sh <<LFTP_SCRIPT
          open sftp://${SFTP_HOST}
          mkdir -p archive
          set cmd:fail-exit false
          get index.php -o /tmp/backup_index.php
          mirror src /tmp/backup_src
          set cmd:fail-exit true
          quit
          LFTP_SCRIPT

          lftp -f /tmp/lftp_backup.sh || { echo "Backup step failed"; exit 1; }

          # Build archive from whatever was downloaded (handles first deploy)
          ARCHIVE_CONTENTS=""
          [ -f /tmp/backup_index.php ] && ARCHIVE_CONTENTS="$ARCHIVE_CONTENTS backup_index.php"
          [ -d /tmp/backup_src ] && ARCHIVE_CONTENTS="$ARCHIVE_CONTENTS backup_src"

          if [ -n "$ARCHIVE_CONTENTS" ]; then
            tar -czf /tmp/${ARCHIVE_NAME} -C /tmp $ARCHIVE_CONTENTS
          else
            echo "No existing files found — skipping backup archive creation (first deploy)"
          fi

          # --- Step 2: Upload archive and deploy new files ---
          cat > /tmp/lftp_deploy.sh <<LFTP_SCRIPT
          open sftp://${SFTP_HOST}
          set xfer:log true
          $([ -f /tmp/${ARCHIVE_NAME} ] && echo "put /tmp/${ARCHIVE_NAME} -o archive/${ARCHIVE_NAME}")
          set cmd:fail-exit false
          rm index.php
          rm -rf src
          set cmd:fail-exit true
          lcd ${REPO_DIR}
          put index.php
          mirror -R src src
          quit
          LFTP_SCRIPT

          lftp -f /tmp/lftp_deploy.sh || { echo "Deploy step failed"; exit 1; }
