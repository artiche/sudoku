name: CICD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Backup and deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.sftp_host }}
          SFTP_USER: ${{ secrets.sftp_user }}
          SFTP_PWD: ${{ secrets.sftp_pwd }}
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          ARCHIVE_NAME="backup_${TIMESTAMP}.tar.gz"
          REPO_DIR="${GITHUB_WORKSPACE}"

          # Store credentials in ~/.netrc to avoid exposure in process list
          echo "machine ${SFTP_HOST} login ${SFTP_USER} password ${SFTP_PWD}" > ~/.netrc
          chmod 600 ~/.netrc

          # Write the lftp script to a temp file
          cat > /tmp/lftp_deploy.sh <<LFTP_SCRIPT
          open sftp://${SFTP_HOST}

          # Ensure archive directory exists
          mkdir -p archive

          # Download existing files for backup (ignore errors on first deploy)
          set cmd:fail-exit false
          get index.php -o /tmp/backup_index.php
          mirror src /tmp/backup_src
          set cmd:fail-exit true

          quit
          LFTP_SCRIPT

          lftp -f /tmp/lftp_deploy.sh

          # Build archive from whatever was downloaded (handle first deploy gracefully)
          ARCHIVE_CONTENTS=""
          [ -f /tmp/backup_index.php ] && ARCHIVE_CONTENTS="$ARCHIVE_CONTENTS backup_index.php"
          [ -d /tmp/backup_src ] && ARCHIVE_CONTENTS="$ARCHIVE_CONTENTS backup_src"

          if [ -n "$ARCHIVE_CONTENTS" ]; then
            tar -czf /tmp/${ARCHIVE_NAME} -C /tmp $ARCHIVE_CONTENTS
          else
            # Create an empty archive on first deploy
            tar -czf /tmp/${ARCHIVE_NAME} -T /dev/null
          fi

          # Write the deploy lftp script
          cat > /tmp/lftp_upload.sh <<LFTP_SCRIPT
          open sftp://${SFTP_HOST}

          # Upload backup archive
          put /tmp/${ARCHIVE_NAME} -o archive/${ARCHIVE_NAME}

          # Remove old files (ignore errors if they don't exist)
          set cmd:fail-exit false
          rm index.php
          glob rm -rf src/*
          rmdir src
          set cmd:fail-exit true

          # Upload new files from the checked-out repository
          lcd ${REPO_DIR}
          put index.php
          mirror -R src src

          quit
          LFTP_SCRIPT

          lftp -f /tmp/lftp_upload.sh

          # Clean up
          rm -f ~/.netrc /tmp/lftp_deploy.sh /tmp/lftp_upload.sh
